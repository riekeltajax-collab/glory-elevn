name: Migrate Shopify Photos
on:
  push:
    paths:
      - '.github/workflows/migrate-photos.yml'
jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download and save photos
        run: |
          python3 << 'EOF'
import urllib.request, os, time

os.makedirs("images", exist_ok=True)

def migrate(url, path):
    if os.path.exists(path):
        print(f"Already exists: {path}")
        return
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        with urllib.request.urlopen(req, timeout=30) as r:
            data = r.read()
        with open(path, "wb") as f:
            f.write(data)
        print(f"OK {path} ({len(data)//1024}KB)")
        time.sleep(0.15)
    except Exception as e:
        print(f"FAIL {path}: {e}")

  migrate("https://gloryelevn.com/cdn/shop/files/2D153630-6CC4-4041-8DC5-73828998AE72.jpg?v=1755884834", "images/2D153630-6CC4-4041-8DC5-73828998AE72.jpg")
