name: Migrate Shopify Photos
on:
  push:
    paths:
      - '.github/workflows/migrate-photos.yml'
jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download photos
        run: |
          python3 - << 'PYEOF'
import urllib.request, os, time
os.makedirs("images", exist_ok=True)
with open(".github/workflows/urls.txt") as f:
    lines = [l.strip() for l in f if l.strip()]
for line in lines:
    url, path = line.split("|", 1)
    if os.path.exists(path):
        print("skip " + path)
        continue
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        with urllib.request.urlopen(req, timeout=30) as r:
            data = r.read()
        with open(path, "wb") as f2:
            f2.write(data)
        print("ok " + path + " " + str(len(data)//1024) + "KB")
        time.sleep(0.1)
    except Exception as e:
        print("fail " + path + " " + str(e))
PYEOF
      - name: Commit
        run: |
          git config user.name "Glory Elevn"
          git config user.email "admin@gloryelevn.com"
          git add images/
          git diff --staged --quiet || git commit -m "Foto migratie Shopify naar GitHub"
          git push
